# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, so that env.py can find the models
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to truncate the migration slug to
# truncate_slug_length = 40

# version table name
# version_table = alembic_version

# sqlalchemy.url is loaded dynamically in env.py from the settings module
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/realstate_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
